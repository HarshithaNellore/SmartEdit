name: smartcut
description: "SmartCut - AI-Powered Photo & Video Editor"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  google_fonts: ^6.2.1
  image_picker: ^1.1.2

  path_provider: ^2.1.5
  uuid: ^4.5.1
  intl: ^0.20.2
  share_plus: ^10.1.4
  flutter_colorpicker: ^1.1.0
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  percent_indicator: ^4.2.3
  lottie: ^3.3.1
  animate_do: ^3.3.4
  iconsax_flutter: ^1.0.0+1
  glass_kit: ^4.0.1
  http: ^1.2.1
  video_player: ^2.8.2
  shared_preferences: ^2.3.3
  ffmpeg_kit_flutter_min_gpl: ^6.0.3
  file_picker: ^10.3.10
  crop_image: ^1.0.17

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/images/
    - assets/animations/
